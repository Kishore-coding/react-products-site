# Name of your workflow — shows up in GitHub Actions tab
name: Deploy to Vercel

# TRIGGER: When should this workflow run?
on:
  push:
    branches:
      - main
      - stage
  pull_request:
    branches:
      - main


# JOBS: What should it do?
#A job is a set of steps that run together on a machine (runner). Each job runs in its own runner environment.
#A job can be defined in the workflow file or in a reusable workflow file.
jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest # GitHub gives us a free Linux machine to run this

    steps:
      # Step 1: Download your code onto the Linux machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Node.js so we can run npm commands
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm" # Cache node_modules to make future runs faster

      # Step 3: Install your project dependencies (like running npm install)
      - name: Install dependencies
        run: npm ci # 'ci' is safer than 'install' — it uses exact versions from package-lock.json

      # Step 4: Build your React app (creates the 'dist' or 'build' folder)
      - name: Build project
        run: npm run build

      # Step 5: Install Vercel's command line tool on the Linux machine
      - name: Install Vercel CLI
        run: npm install -g vercel

      # Step 6: Deploy to Vercel using your secret keys
      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
